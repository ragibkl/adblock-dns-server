version: "3"

services:
  dns:
    image: ragibkl/bancuh-dns:2
    restart: always
    cap_add:
      - NET_BIND_SERVICE
    network_mode: host
    env_file: .env
    volumes:
      - ../../data:/local-data/
      - certs:/var/cache/bancuh-dns/certs
    logging:
      driver: json-file
      options:
        max-size: 1m
        max-file: "20"

volumes:
  certs:
